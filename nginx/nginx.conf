# HTTP → HTTPS REDIRECT
# =========================
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name tender.shuwaikhgate.com;

    return 301 https://$host$request_uri;
}

# =========================
# HTTPS SERVER (MAIN APP)
# =========================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name tender.shuwaikhgate.com;

    # SSL CERTIFICATES (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/tender.shuwaikhgate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tender.shuwaikhgate.com/privkey.pem;

    # Security (optional but recommended)
    ssl_protocols TLSv1.2 TLSv1.3;

    # =========================
    # SUPABASE API ROUTES
    # =========================
    location ~ ^/(auth|rest|storage|graphql|pg|realtime) {
        proxy_pass http://192.168.11.65:54321;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================
    # REACT FRONTEND
    # =========================
    location / {
        proxy_pass http://172.17.0.1:3000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}