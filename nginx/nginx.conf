# =========================================================
# MAIN HTTP SERVER (Domain & Local IP Access)
# =========================================================
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # Added '_' catch-all so you can access via domain OR raw local IP
    server_name tender.shuwaikhgate.com _;

    # =========================
    # 1. SUPABASE API ROUTES
    # =========================
    location ~ ^/(auth|rest|storage|graphql|pg|realtime) {
        proxy_pass http://192.168.11.65:54321;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================
    # 2. REACT FRONTEND
    # =========================
    location / {
        # Adjust to http://app:3000 if your docker containers share a named network
        proxy_pass http://172.17.0.1:3000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}