# 1. HTTP Block: Automatically redirect all unsecured traffic to HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name tender.shuwaikhgate.com _;

    return 301 https://$host$request_uri;
}

# 2. HTTPS Block: Securely handles both your React Frontend and Supabase API
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name tender.shuwaikhgate.com _;

    # SSL Certificate Paths (Linked from your host machine via Docker volumes)
    ssl_certificate     /etc/letsencrypt/live/tender.shuwaikhgate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tender.shuwaikhgate.com/privkey.pem;

    # Secure SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # BLOCK A: Intercept Supabase API calls and route them to Port 54321
    location ~ ^/(auth|rest|storage|graphql|pg|realtime) {
        proxy_pass http://192.168.11.65:54321; 
        
        # WebSockets for Supabase Realtime
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Standard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # BLOCK B: Route everything else (the website itself) to React on Port 3000
    location / {
        proxy_pass http://app:3000; # Routes to your 'app' service inside the docker network
        
        # Keep these to support Webpack/Vite hot-reloading if needed
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Standard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}