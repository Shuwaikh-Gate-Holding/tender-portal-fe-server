server {
    listen 80;
    server_name betatender.shuwaikhgate.com;

    # 1. Intercept Supabase API calls and route them to Port 54321
    # This must come BEFORE the "location /" block
    location ~ ^/(auth|rest|storage|graphql|pg|realtime) {
        proxy_pass http://192.168.11.65:54321; 
        
        # WebSockets for Realtime
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Standard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Route everything else (the website itself) to React on Port 3000
    location / {
        proxy_pass http://app:3000;
        
        # Keep these to support Webpack/Vite hot-reloading if needed
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Standard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}